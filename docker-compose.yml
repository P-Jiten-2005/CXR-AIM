version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: cxr-aim-db
    environment:
      POSTGRES_USER: cxr_user
      POSTGRES_PASSWORD: cxr_password
      POSTGRES_DB: cxr_target_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cxr_user -d cxr_target_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cxr-aim-backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://cxr_user:cxr_password@db/cxr_target_db
      - UPLOAD_DIR=/app/uploads
    volumes:
      - backend-uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy
    restart: always

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: cxr-aim-frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      - backend
    restart: always

volumes:
  pgdata:
  backend-uploads:
